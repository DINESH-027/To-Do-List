<!DOCTYPE html>
<html>
    <head>
        <title>TO-Do list</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="todo">
        <div class="h1">
        <h2 >TO-DO LIST</h2>
        </div>
        <div class="input">
            <input type="text" id="add" placeholder="Add your task">
            <button id="submit">Add</button>
        </div>
        <div>
        <ul id="todolist">

        </ul>
        </div>
        <div class="h2">
        <h2>Completed</h2>
        </div>
        <div class="comp">
        <ul id="completed">

        </ul>
        </div>
        </div>
        <script src="script.js">
        </script>
    </body>
</html>
